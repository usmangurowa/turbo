packages:
  - apps/web
  - apps/mobile
  - packages/*
  - tooling/*

catalog:
  '@better-auth/cli': 1.4.0-beta.9
  '@better-auth/expo': 1.4.0-beta.9
  '@eslint/js': ^9.38.0
  '@tailwindcss/postcss': ^4.1.16
  '@tailwindcss/vite': ^4.1.16
  '@tanstack/react-query': ^5.90.8
  '@types/node': ^22.18.12
  '@vitejs/plugin-react': 5.1.0
  better-auth: 1.4.0-beta.9
  eslint: ^9.38.0
  prettier: ^3.5.3
  tailwindcss: ^4.1.16
  typescript: ^5.9.3
  vite: 7.1.12
  zod: 4.1.12

catalogs:
  react19:
    '@types/react': ~19.1.0
    '@types/react-dom': ~19.1.0
    react: 19.1.2
    react-dom: 19.1.2

linkWorkspacePackages: true

nodeLinker: hoisted

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild

overrides:
  '@types/minimatch': 5.1.2
  lightningcss: 1.30.1
  prettier: 3.5.3
  react: 19.1.2
  vite: 7.1.12

publicHoistPattern:
  - '@ianvs/prettier-plugin-sort-imports'
  - prettier-plugin-tailwindcss
  - react
  - react-native
  - react-dom
