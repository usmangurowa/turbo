  - esbuild

overrides:
  '@types/minimatch': 5.1.2
  '@vercel/postgres': '-'
  '@expo/dom-webview': 56.0.5
  '@expo/metro-runtime': 56.0.13
  better-call: 1.3.5
  lightningcss: 1.30.1
  prettier: 3.8.3
  react: 19.2.3
  react-dom: 19.2.3
  vite: 7.1.12

publicHoistPattern:
  - '@ianvs/prettier-plugin-sort-imports'
  - prettier-plugin-tailwindcss
  - react
  - react-native
  - react-dom
