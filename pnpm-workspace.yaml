packages:
  - apps/web
  - apps/mobile
  - apps/server
  - packages/*
  - tooling/*

catalog:
  '@better-auth/cli': 1.4.21
  '@better-auth/expo': 1.6.14
  '@eslint/js': ^9.39.4
  '@tailwindcss/postcss': ^4.3.0
  '@tailwindcss/vite': ^4.3.0
  '@tanstack/react-query': ^5.101.0
  '@types/node': ^22.19.19
  '@vitejs/plugin-react': 5.1.0
  better-auth: 1.6.14
  eslint: ^9.39.4
  prettier: ^3.8.3
  tailwindcss: ^4.3.0
  typescript: ^6.0.3
  vite: 7.1.12
  zod: 4.4.3

catalogs:
  react19:
    '@types/react': ^19.2.16
    '@types/react-dom': ^19.2.3
    react: 19.2.3
    react-dom: 19.2.3

linkWorkspacePackages: true

nodeLinker: hoisted

onlyBuiltDependencies:
