name: Production DB Migrate

on:
  push:
    branches: ["main"]
    paths:
      - "packages/db/drizzle/**"
      - ".github/workflows/db-migrate-production.yml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: production-db-migrate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Apply production migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Validate production database URL
        shell: bash
        env:
          POSTGRES_URL: ${{ secrets.PRODUCTION_POSTGRES_URL }}
        run: |
          if [[ -z "$POSTGRES_URL" ]]; then
            echo "Missing PRODUCTION_POSTGRES_URL secret in the production GitHub Environment."
            exit 1
          fi

      - name: Run Drizzle migrations
        env:
          POSTGRES_URL: ${{ secrets.PRODUCTION_POSTGRES_URL }}
        run: pnpm db:migrate